<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argus</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; display: flex; flex-direction: column; }

  #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 32px; width: 320px; }
  .login-box h1 { font-size: 20px; margin-bottom: 24px; color: #58a6ff; }
  .login-box input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 8px 12px; font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-box input:focus { border-color: #58a6ff; }
  .btn { background: #238636; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 14px; padding: 8px 16px; }
  .btn:hover { background: #2ea043; }
  .btn.secondary { background: #21262d; border: 1px solid #30363d; }
  .btn.secondary:hover { background: #30363d; }
  .btn.danger { background: #da3633; }
  .btn.danger:hover { background: #f85149; }

  #main-screen { display: none; flex-direction: row; height: 100vh; }

  #sidebar { width: 220px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar-header { padding: 16px; border-bottom: 1px solid #30363d; font-size: 13px; font-weight: 600; color: #8b949e; letter-spacing: .5px; display: flex; align-items: center; justify-content: space-between; }
  #agent-list { flex: 1; overflow-y: auto; padding: 8px; }
  .agent-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: background .15s; font-size: 13px; }
  .agent-item:hover { background: #21262d; }
  .agent-item.active { background: #1f3a5f; border: 1px solid #388bfd; }
  .agent-hostname { font-weight: 600; color: #e6edf3; }
  .agent-os { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; display: inline-block; margin-right: 6px; }

  #content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
  #toolbar .agent-title { font-size: 14px; color: #8b949e; flex: 1; }

  #tabs { display: flex; gap: 4px; padding: 8px 16px 0; background: #161b22; border-bottom: 1px solid #30363d; }
  .tab { padding: 6px 14px; font-size: 13px; cursor: pointer; border-radius: 6px 6px 0 0; color: #8b949e; border-bottom: 2px solid transparent; }
  .tab.active { color: #e6edf3; border-bottom-color: #58a6ff; }

  #panels { flex: 1; overflow: hidden; position: relative; }
  .panel { position: absolute; inset: 0; display: none; }
  .panel.active { display: flex; flex-direction: column; }

  #terminal-panel { padding: 0; }
  #terminal-container { flex: 1; overflow: hidden; padding: 8px; }

  #screenshot-panel { align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 24px; }
  #screenshot-panel img { max-width: 100%; max-height: calc(100vh - 200px); border-radius: 6px; border: 1px solid #30363d; display: none; }
  #screenshot-loading { color: #8b949e; font-size: 14px; display: none; }

  #camera-panel { align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 24px; }
  #camera-panel img { max-width: 100%; max-height: calc(100vh - 200px); border-radius: 6px; border: 1px solid #30363d; display: none; }
  #camera-status { color: #8b949e; font-size: 14px; }

  #no-agent { flex: 1; display: flex; align-items: center; justify-content: center; color: #8b949e; font-size: 15px; }

  .error-banner { background: #da3633; color: #fff; padding: 8px 16px; font-size: 13px; display: none; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Argus</h1>
    <input type="password" id="password-input" placeholder="Operator password" autocomplete="current-password">
    <div id="login-error" style="color:#f85149;font-size:13px;margin-bottom:10px;display:none;"></div>
    <button class="btn" onclick="login()" style="width:100%">Connect</button>
  </div>
</div>

<div id="main-screen">
  <div id="sidebar">
    <div id="sidebar-header">
      AGENTS
      <button class="btn secondary" style="font-size:11px;padding:3px 8px" onclick="refreshAgents()">Refresh</button>
    </div>
    <div id="agent-list"><div style="padding:12px;color:#8b949e;font-size:13px;">No agents connected.</div></div>
  </div>

  <div id="content">
    <div id="no-agent">Select an agent from the sidebar.</div>

    <div id="agent-view" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="error-banner" id="error-banner"></div>
      <div id="toolbar">
        <span class="agent-title" id="toolbar-title">—</span>
        <button class="btn secondary" onclick="refreshAgents()">Agents</button>
      </div>
      <div id="tabs">
        <div class="tab active" onclick="switchTab('terminal')">Terminal</div>
        <div class="tab" onclick="switchTab('screenshot')">Screenshot</div>
        <div class="tab" onclick="switchTab('camera')">Camera</div>
      </div>
      <div id="panels">
        <div class="panel active" id="terminal-panel">
          <div id="terminal-container"></div>
        </div>
        <div class="panel" id="screenshot-panel">
          <button class="btn" onclick="takeScreenshot()">Capture Screenshot</button>
          <div id="screenshot-loading">Capturing...</div>
          <img id="screenshot-img" alt="Screenshot">
        </div>
        <div class="panel" id="camera-panel">
          <div id="camera-status">Camera not started.</div>
          <img id="camera-img" alt="Camera">
          <div style="display:flex;gap:8px;">
            <button class="btn" onclick="startCamera()">Start Camera</button>
            <button class="btn danger" onclick="stopCamera()">Stop Camera</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const MSG = {
  AGENT_AUTH: 'agent_auth', OPERATOR_AUTH: 'operator_auth',
  AUTH_OK: 'auth_ok', AUTH_FAIL: 'auth_fail',
  AGENT_LIST: 'agent_list', SELECT_AGENT: 'select_agent',
  SHELL_START: 'shell_start', SHELL_INPUT: 'shell_input', SHELL_OUTPUT: 'shell_output', SHELL_RESIZE: 'shell_resize',
  SCREENSHOT_REQ: 'screenshot_req', SCREENSHOT_DATA: 'screenshot_data',
  CAMERA_START: 'camera_start', CAMERA_STOP: 'camera_stop', CAMERA_FRAME: 'camera_frame',
  ERROR: 'error',
};

let ws = null;
let term = null;
let fitAddon = null;
let selectedAgent = null;
let cameraRunning = false;
let shellStarted = false;

function send(type, data) {
  ws.send(JSON.stringify({ type, data: data ?? null }));
}

function login() {
  const pw = document.getElementById('password-input').value;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/operator`);

  ws.onopen = () => send(MSG.OPERATOR_AUTH, { password: pw });

  ws.onmessage = e => handleMessage(JSON.parse(e.data));

  ws.onclose = () => {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-screen').style.display = 'none';
    selectedAgent = null;
    shellStarted = false;
  };
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

function handleMessage(msg) {
  switch (msg.type) {
    case MSG.AUTH_OK:
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'flex';
      initTerminal();
      break;
    case MSG.AUTH_FAIL:
      showLoginError('Invalid password.');
      ws.close();
      break;
    case MSG.AGENT_LIST:
      renderAgentList(msg.data || []);
      break;
    case MSG.SHELL_OUTPUT:
      if (term && msg.data) term.write(msg.data.data);
      break;
    case MSG.SCREENSHOT_DATA:
      if (msg.data) showScreenshot(msg.data.image);
      break;
    case MSG.CAMERA_FRAME:
      if (msg.data && cameraRunning) {
        const img = document.getElementById('camera-img');
        img.src = 'data:image/jpeg;base64,' + msg.data.image;
        img.style.display = 'block';
        document.getElementById('camera-status').style.display = 'none';
      }
      break;
    case MSG.ERROR:
      showError(msg.data ? msg.data.message : 'Unknown error');
      break;
  }
}

function showLoginError(text) {
  const el = document.getElementById('login-error');
  el.textContent = text;
  el.style.display = 'block';
}

function showError(text) {
  const el = document.getElementById('error-banner');
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function renderAgentList(agents) {
  const list = document.getElementById('agent-list');
  if (!agents.length) {
    list.innerHTML = '<div style="padding:12px;color:#8b949e;font-size:13px;">No agents connected.</div>';
    return;
  }
  list.innerHTML = agents.map(a => `
    <div class="agent-item ${selectedAgent === a.id ? 'active' : ''}" onclick="selectAgent('${a.id}', '${a.hostname}', '${a.os}')">
      <div class="agent-hostname"><span class="dot"></span>${a.hostname}</div>
      <div class="agent-os">${a.os} · ${a.id.substring(0,8)}</div>
    </div>
  `).join('');
}

function selectAgent(id, hostname, os) {
  selectedAgent = id;
  shellStarted = false;
  cameraRunning = false;
  send(MSG.SELECT_AGENT, { agent_id: id });
  send(MSG.AGENT_LIST, null); // refresh list for active highlight

  document.getElementById('no-agent').style.display = 'none';
  document.getElementById('agent-view').style.display = 'flex';
  document.getElementById('toolbar-title').textContent = `${hostname} (${os})`;

  // refresh agents list with updated active state
  refreshAgents();

  switchTab('terminal');
  setTimeout(() => {
    if (!shellStarted) {
      send(MSG.SHELL_START, null);
      shellStarted = true;
    }
    if (fitAddon) fitAddon.fit();
    if (term) term.focus();
  }, 100);
}

function refreshAgents() {
  send(MSG.AGENT_LIST, null);
}

function initTerminal() {
  if (term) return;
  term = new Terminal({
    theme: { background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff' },
    fontSize: 14,
    fontFamily: '"Cascadia Code", "Fira Code", monospace',
    cursorBlink: true,
  });
  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();

  term.onData(data => {
    if (selectedAgent) send(MSG.SHELL_INPUT, { data });
  });

  term.onResize(({ cols, rows }) => {
    if (selectedAgent) send(MSG.SHELL_RESIZE, { cols, rows });
  });

  window.addEventListener('resize', () => fitAddon.fit());
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['terminal', 'screenshot', 'camera'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name + '-panel').classList.add('active');
  if (name === 'terminal' && fitAddon) setTimeout(() => fitAddon.fit(), 50);
}

function takeScreenshot() {
  document.getElementById('screenshot-loading').style.display = 'block';
  document.getElementById('screenshot-img').style.display = 'none';
  send(MSG.SCREENSHOT_REQ, null);
}

function showScreenshot(b64) {
  document.getElementById('screenshot-loading').style.display = 'none';
  const img = document.getElementById('screenshot-img');
  img.src = 'data:image/png;base64,' + b64;
  img.style.display = 'block';
}

function startCamera() {
  cameraRunning = true;
  document.getElementById('camera-status').textContent = 'Starting camera...';
  document.getElementById('camera-status').style.display = 'block';
  document.getElementById('camera-img').style.display = 'none';
  send(MSG.CAMERA_START, null);
}

function stopCamera() {
  cameraRunning = false;
  send(MSG.CAMERA_STOP, null);
  document.getElementById('camera-img').style.display = 'none';
  document.getElementById('camera-status').textContent = 'Camera stopped.';
  document.getElementById('camera-status').style.display = 'block';
}
</script>
</body>
</html>
