# Argus C2 — nginx reverse proxy
# Looks like a CDN endpoint from the outside.

server_tokens off;

# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name your-domain-here.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name your-domain-here.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain-here.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain-here.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Make responses look like a CDN
    add_header X-Cache-Status  "HIT";
    add_header X-CDN-Edge      "edge-us-east-1a";
    add_header Cache-Control   "public, max-age=3600";

    # WebSocket endpoints — long timeout required for persistent agent connections
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # Operator web UI + everything else
    location / {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
